<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flow Travel - The Compass</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3B4D61", // Slate Blue
                        "background-light": "#F7F5F2", // Warm Rice Paper
                        "background-dark": "#111921",
                        "surface": "#FFFFFF",
                        "text-main": "#2C333A",
                        "muted": "#9AA5B1",
                        "success": "#8CB369", // Sage Green
                        "highlight": "#E6B89C", // Soft Terracotta
                        "accent": "#8D99AE", // Cool Grey
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem", // Approx 32px
                        "2xl": "2.5rem",
                        "3xl": "3rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "soft": "0 4px 20px -8px rgba(59, 77, 97, 0.08)",
                        "floating": "0 8px 30px -4px rgba(59, 77, 97, 0.12)",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom Map Styles Simulation */
        .map-bg {
            background-color: #E5E0D8; /* Slightly darker rice paper for map base */
            background-image: 
                radial-gradient(#dcd8d0 1px, transparent 1px),
                linear-gradient(to right, rgba(255,255,255,0.4) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.4) 1px, transparent 1px);
            background-size: 20px 20px, 100px 100px, 100px 100px;
        }
        
        /* Simulating map features */
        .map-road {
            position: absolute;
            background-color: #FFFFFF;
            opacity: 0.8;
            border-radius: 999px;
        }
        
        .map-water {
            position: absolute;
            background-color: #D6E4EE;
            border-radius: 50%;
        }

        .map-park {
            position: absolute;
            background-color: #E3EEDD;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }

        /* Dashed Line Animation */
        @keyframes dash {
            to {
                stroke-dashoffset: -20;
            }
        }
        .animate-dash {
            animation: dash 1s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light text-text-main font-display h-screen w-full overflow-hidden flex flex-col relative antialiased selection:bg-highlight/30">
<!-- Map Container -->
<div aria-label="Interactive map of Tokyo" class="absolute inset-0 w-full h-full map-bg overflow-hidden z-0">
<!-- Abstract Map Features (Background) -->
<div class="map-water w-[400px] h-[400px] -right-20 top-20 opacity-60"></div>
<div class="map-park w-[300px] h-[200px] left-10 bottom-40 opacity-50"></div>
<!-- Roads -->
<div class="map-road w-[120%] h-4 -left-10 top-1/3 -rotate-12"></div>
<div class="map-road w-[120%] h-3 -left-10 top-1/2 rotate-6"></div>
<div class="map-road w-4 h-[120%] left-1/3 -top-10 rotate-12"></div>
<div class="map-road w-3 h-[120%] right-1/4 -top-10 -rotate-3"></div>
<!-- SVG Layer for Route Lines -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-10" style="overflow: visible;">
<!-- Completed Route (Solid Sage Green) -->
<path d="M 120 180 Q 180 250 220 380" fill="none" stroke="#8CB369" stroke-linecap="round" stroke-width="4"></path>
<!-- Future Route (Dashed Primary) -->
<path class="opacity-40" d="M 220 380 Q 260 520 180 650" fill="none" stroke="#3B4D61" stroke-dasharray="8 8" stroke-linecap="round" stroke-width="4"></path>
</svg>
<!-- Map Markers -->
<!-- Pin 1: Completed -->
<div class="absolute top-[180px] left-[120px] -translate-x-1/2 -translate-y-1/2 z-20 group cursor-pointer">
<div class="flex items-center justify-center w-10 h-10 bg-success text-white rounded-full shadow-sm text-sm font-bold border-2 border-white transition-transform transform group-hover:scale-110">
<span class="material-symbols-outlined text-[18px]">check</span>
</div>
<div class="absolute top-full mt-2 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-success shadow-sm whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">
                Tsukiji Market
            </div>
</div>
<!-- Pin 2: Current (Active) -->
<div class="absolute top-[380px] left-[220px] -translate-x-1/2 -translate-y-1/2 z-30 cursor-pointer">
<!-- Pulsing Effect -->
<div class="absolute inset-0 bg-highlight rounded-full animate-ping opacity-75"></div>
<!-- Pin -->
<div class="relative flex items-center justify-center w-12 h-12 bg-highlight text-white rounded-full shadow-floating text-lg font-bold border-4 border-white">
                2
            </div>
<!-- Tooltip Card (Always visible for demo) -->
<div class="absolute bottom-full mb-4 left-1/2 -translate-x-1/2 w-64 bg-surface rounded-xl shadow-floating p-4 flex flex-col gap-3 animate-bounce-slight origin-bottom transition-all">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-primary text-lg leading-tight">Mori Art Museum</h3>
<p class="text-muted text-xs font-medium mt-1">Stop 2 • Arrived 10:15 AM</p>
</div>
<button class="text-muted hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="w-full h-[100px] rounded-lg bg-cover bg-center relative overflow-hidden" data-alt="Modern art museum interior with abstract architecture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAw2rXF35AHVzBsbF1da8zvfM0adGU9RGf_ZYQClHXTwZYVn4oRPI6RVjsQpne_MBx7rIUNXJCBtrdQG-K7I6IAbIu4sCvLi1XV0ooJL3MvcAxjN0saCXrOafx9FU3fc9Jo4-XIi4XtKjPFaVJdBA22aA1_VYO2MO5scIifZ06E9TnRX85uT-fMFIOxzZ_5dhSUhwIrWZNK23vbwY93fPyU3Bvb4SyCrTpT9zLqaQ4_K2jP4rJSkWQTjoOfeq9f5xZILHM8vqiFiQ6g');">
<div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
<div class="absolute bottom-2 left-3 text-white text-xs font-medium flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">confirmation_number</span>
                        Ticket Required
                    </div>
</div>
<button class="w-full py-2.5 bg-primary text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2 hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[18px]">navigation</span>
                    Navigate
                </button>
<!-- Triangle Pointer -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-surface rotate-45"></div>
</div>
</div>
<!-- Pin 3: Future -->
<div class="absolute top-[650px] left-[180px] -translate-x-1/2 -translate-y-1/2 z-20 group cursor-pointer">
<div class="flex items-center justify-center w-10 h-10 bg-primary text-white rounded-full shadow-sm text-sm font-bold border-2 border-white transition-transform transform group-hover:scale-110">
                3
            </div>
<div class="absolute top-full mt-2 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-primary shadow-sm whitespace-nowrap">
                Gonpachi Nishi-Azabu
            </div>
</div>
</div>
<!-- UI Overlay Layer -->
<div class="relative z-40 flex flex-col h-full pointer-events-none justify-between">
<!-- Header -->
<header class="w-full pt-12 pb-6 px-6 bg-gradient-to-b from-white/90 via-white/50 to-transparent pointer-events-auto">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<h1 class="text-2xl font-bold text-primary tracking-tight">Tokyo Day 1</h1>
<div class="flex items-center gap-2 text-muted text-sm font-medium mt-0.5">
<span class="w-2 h-2 rounded-full bg-highlight"></span>
<span>In Progress</span>
<span>•</span>
<span>5 stops</span>
</div>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface shadow-soft text-primary hover:bg-primary hover:text-white transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Bottom Controls -->
<div class="w-full p-6 pb-8 flex items-end justify-between pointer-events-none">
<!-- Map Controls (Zoom/Locate) -->
<div class="flex flex-col gap-3 pointer-events-auto">
<button class="w-12 h-12 bg-surface rounded-full shadow-soft flex items-center justify-center text-primary hover:bg-gray-50 active:scale-95 transition-all">
<span class="material-symbols-outlined">my_location</span>
</button>
<div class="flex flex-col bg-surface rounded-full shadow-soft overflow-hidden">
<button class="w-12 h-12 flex items-center justify-center text-primary hover:bg-gray-50 active:bg-gray-100 transition-colors border-b border-gray-100">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-12 h-12 flex items-center justify-center text-primary hover:bg-gray-50 active:bg-gray-100 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<!-- List View Toggle FAB -->
<button class="pointer-events-auto group flex items-center gap-3 bg-primary text-white pl-5 pr-6 py-4 rounded-full shadow-floating hover:shadow-xl hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined group-hover:-translate-x-0.5 transition-transform">format_list_bulleted</span>
<span class="font-bold text-base tracking-wide">Stream</span>
</button>
</div>
</div>
</body></html>
