<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flow Travel - Location Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3B4D61", // Adjusted to match PRD Slate Blue while respecting structure
              "background-light": "#F7F5F2", // PRD Warm Rice Paper
              "background-dark": "#111921",
              "surface": "#FFFFFF",
              "muted": "#9AA5B1",
              "accent": "#8D99AE",
              "success": "#8CB369",
              "highlight": "#E6B89C",
              "danger": "#EF4444",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "1rem", 
              "lg": "1.5rem", 
              "xl": "2rem", 
              "2xl": "2.5rem",
              "full": "9999px"
            },
            boxShadow: {
              "soft": "0 4px 20px -8px rgba(59, 77, 97, 0.08)",
              "glow": "0 0 0 4px rgba(59, 77, 97, 0.1)"
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        /* Custom scrollbar hiding for cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark h-screen w-full overflow-hidden flex justify-center items-center relative text-[#2C333A]">
<!-- Background Mockup: The Stream (Blurred/Dimmed to simulate overlay) -->
<div aria-hidden="true" class="absolute inset-0 w-full h-full flex flex-col items-center opacity-30 blur-[2px] pointer-events-none overflow-hidden">
<div class="w-full max-w-md h-full flex flex-col p-6 space-y-8">
<div class="flex justify-between items-center">
<h1 class="text-2xl font-bold text-primary">Tokyo Day 1</h1>
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary">map</span>
</div>
</div>
<!-- Timeline Item 1 -->
<div class="flex gap-4">
<div class="flex flex-col items-center">
<div class="w-3 h-3 rounded-full bg-success"></div>
<div class="w-[3px] flex-1 bg-success my-2"></div>
</div>
<div class="flex-1 p-4 bg-white rounded-xl shadow-soft flex items-center justify-between opacity-60">
<div>
<span class="text-xs text-muted font-bold block mb-1">09:00 AM</span>
<span class="font-bold text-primary line-through decoration-slate-400">Hotel Gracery</span>
</div>
</div>
</div>
<!-- Travel Pill -->
<div class="flex gap-4">
<div class="flex flex-col items-center w-[12px]">
<div class="w-[3px] h-full bg-muted/30"></div>
</div>
<div class="py-1 px-3 bg-accent/20 rounded-full text-xs font-medium text-primary w-fit">
                    15 min walk
                </div>
</div>
<!-- Timeline Item 2 (Active) -->
<div class="flex gap-4">
<div class="flex flex-col items-center relative">
<div class="absolute w-6 h-6 rounded-full border-2 border-highlight animate-pulse -left-1.5 -top-1.5"></div>
<div class="w-3 h-3 rounded-full bg-primary relative z-10"></div>
<div class="w-[3px] flex-1 bg-muted/30 border-l-[3px] border-dotted border-muted my-2"></div>
</div>
<div class="flex-1 p-5 bg-white rounded-[24px] shadow-soft flex items-center justify-between">
<div>
<span class="text-xs text-highlight font-bold block mb-1">10:00 AM</span>
<span class="text-lg font-bold text-primary">Cafe Mogador</span>
</div>
<span class="material-symbols-outlined text-muted/50">drag_indicator</span>
</div>
</div>
</div>
</div>
<!-- Overlay Backdrop -->
<div class="absolute inset-0 bg-primary/20 backdrop-blur-sm z-10"></div>
<!-- Bottom Sheet Drawer -->
<div class="absolute bottom-0 left-0 w-full h-[85vh] md:h-[65vh] md:max-w-md md:left-1/2 md:-translate-x-1/2 bg-surface rounded-t-[32px] shadow-2xl z-20 flex flex-col transform transition-transform duration-300 ease-out">
<!-- Drag Handle Area -->
<div class="w-full flex justify-center pt-4 pb-2 cursor-grab active:cursor-grabbing">
<div class="w-12 h-1.5 rounded-full bg-gray-200"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto no-scrollbar px-6 pt-2 pb-8">
<!-- Header Actions -->
<div class="flex justify-between items-center mb-6">
<button class="text-muted hover:text-primary transition-colors p-2 -ml-2 rounded-full hover:bg-background-light">
<span class="material-symbols-outlined">close</span>
</button>
<button class="text-primary font-bold text-sm bg-background-light hover:bg-accent/20 px-4 py-2 rounded-full transition-colors">
                    Save
                </button>
</div>
<!-- Title Input -->
<div class="mb-8">
<label class="sr-only" for="location-name">Location Name</label>
<input class="w-full text-3xl font-bold text-primary placeholder-muted bg-transparent border-none p-0 focus:ring-0 focus:outline-none focus:border-none" id="location-name" placeholder="Enter location..." type="text" value="Cafe Mogador"/>
<div class="flex items-center gap-2 mt-2 text-muted">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<span class="text-sm font-medium">Williamsburg, Brooklyn</span>
</div>
</div>
<!-- Time & Duration Cluster -->
<div class="grid grid-cols-2 gap-4 mb-8">
<!-- Arrival Time -->
<div class="group flex flex-col gap-2">
<label class="text-[11px] font-bold text-muted uppercase tracking-wider ml-1">Arrival</label>
<div class="flex items-center bg-background-light group-focus-within:bg-white group-focus-within:shadow-glow transition-all rounded-[20px] px-4 py-4 cursor-pointer hover:bg-gray-50">
<span class="material-symbols-outlined text-primary mr-3">schedule</span>
<input class="bg-transparent border-none p-0 text-lg font-bold text-primary focus:ring-0 w-full cursor-pointer" type="time" value="10:00"/>
</div>
</div>
<!-- Duration -->
<div class="group flex flex-col gap-2">
<label class="text-[11px] font-bold text-muted uppercase tracking-wider ml-1">Duration</label>
<div class="flex items-center bg-background-light group-focus-within:bg-white group-focus-within:shadow-glow transition-all rounded-[20px] px-4 py-4 cursor-pointer hover:bg-gray-50">
<span class="material-symbols-outlined text-primary mr-3">hourglass_empty</span>
<select class="bg-transparent border-none p-0 text-lg font-bold text-primary focus:ring-0 w-full cursor-pointer appearance-none">
<option>30m</option>
<option>45m</option>
<option selected="">1h 30m</option>
<option>2h 00m</option>
</select>
<span class="material-symbols-outlined text-muted text-sm ml-auto">expand_more</span>
</div>
</div>
</div>
<!-- Tag / Type Selection (Bonus for "Soft Utility" feel) -->
<div class="mb-8">
<label class="text-[11px] font-bold text-muted uppercase tracking-wider ml-1 mb-3 block">Category</label>
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
<button class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-full text-sm font-bold shadow-soft whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]">restaurant</span>
                        Food
                    </button>
<button class="flex items-center gap-2 px-4 py-2 bg-background-light text-muted hover:text-primary hover:bg-gray-200 transition-colors rounded-full text-sm font-bold whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]">attractions</span>
                        Sightseeing
                    </button>
<button class="flex items-center gap-2 px-4 py-2 bg-background-light text-muted hover:text-primary hover:bg-gray-200 transition-colors rounded-full text-sm font-bold whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]">shopping_bag</span>
                        Shop
                    </button>
</div>
</div>
<!-- Notes Section -->
<div class="mb-10 group">
<label class="text-[11px] font-bold text-muted uppercase tracking-wider ml-1 mb-2 block" for="notes">Notes</label>
<div class="relative">
<textarea class="w-full bg-background-light group-focus-within:bg-white group-focus-within:shadow-glow transition-all rounded-[24px] border-none p-5 text-base text-primary placeholder-muted/70 focus:ring-0 resize-none leading-relaxed" id="notes" placeholder="Add details like gate codes, reservation names, or menu items..." rows="4">Reservation under Sam. Try the Moroccan eggs.</textarea>
<!-- Decorative "Paper Clip" Icon -->
<div class="absolute right-4 top-4 text-muted/30 pointer-events-none">
<span class="material-symbols-outlined -rotate-45">attach_file</span>
</div>
</div>
</div>
<!-- Danger Zone -->
<div class="flex flex-col items-center justify-center gap-4 mt-auto">
<button class="flex items-center gap-2 text-danger/80 hover:text-danger hover:bg-danger/5 px-6 py-3 rounded-full transition-all text-sm font-bold">
<span class="material-symbols-outlined text-[20px]">delete</span>
                    Remove Stop
                </button>
</div>
</div>
</div>
</body></html>
