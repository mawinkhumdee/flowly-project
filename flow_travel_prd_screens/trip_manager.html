<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flow Travel - Trip Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                    "primary": "#16579c",
                    "primary-light": "#e8eff6",
                    "background-light": "#f6f7f8",
                    "background-dark": "#111921",
                    "surface-light": "#ffffff",
                    "surface-dark": "#1a2632",
                },
                fontFamily: {
                    "display": ["Plus Jakarta Sans", "sans-serif"]
                },
                borderRadius: {
                    "xl": "1.5rem",
                    "2xl": "2rem",
                    "3xl": "2.5rem",
                },
                boxShadow: {
                    "soft": "0 8px 30px -4px rgba(22, 87, 156, 0.08)",
                    "inner-soft": "inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)",
                }
            },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 1,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
        .material-symbols-outlined.light {
            font-variation-settings:
            'FILL' 0,
            'wght' 300,
            'GRAD' 0,
            'opsz' 24
        }
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen selection:bg-primary/20">
<div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-24">
<!-- Header -->
<header class="pt-8 pb-4 px-6 flex items-center justify-between sticky top-0 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm z-10">
<div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">My Journeys</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-1">Where to next?</p>
</div>
<button class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-soft flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined light" style="font-size: 24px;">settings</span>
</button>
</header>
<!-- Main Content Grid -->
<main class="flex-1 px-4 py-2 grid grid-cols-1 gap-4">
<!-- Create New Card -->
<button class="group w-full aspect-[2/1] rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-600 hover:border-primary hover:bg-primary/5 transition-all duration-300 flex flex-col items-center justify-center gap-3 bg-transparent">
<div class="w-12 h-12 rounded-full bg-primary/10 group-hover:bg-primary group-hover:text-white text-primary flex items-center justify-center transition-colors duration-300">
<span class="material-symbols-outlined">add</span>
</div>
<span class="text-slate-600 dark:text-slate-400 font-bold text-sm group-hover:text-primary transition-colors">Plan a New Trip</span>
</button>
<!-- Trip Card 1: Tokyo -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-soft hover:shadow-lg transition-shadow duration-300 cursor-pointer group relative overflow-hidden">
<div class="flex justify-between items-start mb-4 relative z-10">
<div>
<h2 class="text-xl font-bold text-slate-900 dark:text-white group-hover:text-primary transition-colors">Tokyo Day 1</h2>
<div class="flex items-center gap-3 mt-1.5 text-slate-500 dark:text-slate-400">
<span class="text-xs font-semibold bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-lg">5 stops</span>
<span class="text-xs font-medium flex items-center gap-1">
<span class="material-symbols-outlined light" style="font-size: 14px;">schedule</span> 
                                4h 30m
                            </span>
</div>
</div>
<button class="text-slate-300 dark:text-slate-600 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">more_horiz</span>
</button>
</div>
<!-- Abstract Route Preview -->
<div class="h-28 w-full bg-primary-light/50 dark:bg-slate-800/50 rounded-xl relative overflow-hidden flex items-center justify-center" data-alt="Abstract minimalist line map showing a route with 5 stops in Tokyo">
<!-- Decorative Map Elements -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#16579c 1px, transparent 1px); background-size: 16px 16px;"></div>
<!-- Route SVG -->
<svg class="drop-shadow-sm transform group-hover:scale-105 transition-transform duration-500" fill="none" height="80" viewbox="0 0 200 80" width="200" xmlns="http://www.w3.org/2000/svg">
<!-- Path -->
<path class="dark:stroke-sky-400" d="M20 60 C50 60, 60 20, 90 20 C120 20, 130 50, 160 40 L180 30" stroke="#16579c" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
<!-- Stops -->
<circle cx="20" cy="60" fill="white" r="4" stroke="#16579c" stroke-width="2"></circle>
<circle cx="90" cy="20" fill="white" r="4" stroke="#16579c" stroke-width="2"></circle>
<circle cx="160" cy="40" fill="white" r="4" stroke="#16579c" stroke-width="2"></circle>
<circle class="dark:fill-sky-400" cx="180" cy="30" fill="#16579c" r="4"></circle>
</svg>
</div>
</div>
<!-- Trip Card 2: Kyoto -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-soft hover:shadow-lg transition-shadow duration-300 cursor-pointer group relative overflow-hidden">
<div class="flex justify-between items-start mb-4 relative z-10">
<div>
<h2 class="text-xl font-bold text-slate-900 dark:text-white group-hover:text-primary transition-colors">Kyoto Temples</h2>
<div class="flex items-center gap-3 mt-1.5 text-slate-500 dark:text-slate-400">
<span class="text-xs font-semibold bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-lg">3 stops</span>
<span class="text-xs font-medium flex items-center gap-1">
<span class="material-symbols-outlined light" style="font-size: 14px;">schedule</span> 
                                6h 15m
                            </span>
</div>
</div>
<button class="text-slate-300 dark:text-slate-600 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">more_horiz</span>
</button>
</div>
<!-- Abstract Route Preview -->
<div class="h-28 w-full bg-primary-light/50 dark:bg-slate-800/50 rounded-xl relative overflow-hidden flex items-center justify-center" data-alt="Abstract minimalist line map showing a route with 3 stops in Kyoto">
<!-- Decorative Map Elements -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#16579c 1px, transparent 1px); background-size: 16px 16px;"></div>
<!-- Route SVG -->
<svg class="drop-shadow-sm transform group-hover:scale-105 transition-transform duration-500" fill="none" height="80" viewbox="0 0 200 80" width="200" xmlns="http://www.w3.org/2000/svg">
<!-- Path -->
<path class="dark:stroke-sky-400" d="M30 30 L80 60 L140 20" stroke="#16579c" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
<!-- Stops -->
<circle cx="30" cy="30" fill="white" r="4" stroke="#16579c" stroke-width="2"></circle>
<circle cx="80" cy="60" fill="white" r="4" stroke="#16579c" stroke-width="2"></circle>
<circle class="dark:fill-sky-400" cx="140" cy="20" fill="#16579c" r="4"></circle>
</svg>
</div>
</div>
<!-- Trip Card 3: New York -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-soft hover:shadow-lg transition-shadow duration-300 cursor-pointer group relative overflow-hidden opacity-80">
<div class="flex justify-between items-start mb-4 relative z-10">
<div>
<h2 class="text-xl font-bold text-slate-900 dark:text-white group-hover:text-primary transition-colors">NYC Coffee Run</h2>
<div class="flex items-center gap-3 mt-1.5 text-slate-500 dark:text-slate-400">
<span class="text-xs font-semibold bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-2 py-1 rounded-lg flex items-center gap-1">
<span class="material-symbols-outlined" style="font-size: 12px;">check</span>
                                Completed
                            </span>
<span class="text-xs font-medium flex items-center gap-1">
<span class="material-symbols-outlined light" style="font-size: 14px;">schedule</span> 
                                2h 45m
                            </span>
</div>
</div>
<button class="text-slate-300 dark:text-slate-600 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">more_horiz</span>
</button>
</div>
<!-- Abstract Route Preview -->
<div class="h-28 w-full bg-gray-100 dark:bg-slate-800/30 rounded-xl relative overflow-hidden flex items-center justify-center grayscale" data-alt="Abstract minimalist line map showing a completed route in NYC">
<!-- Decorative Map Elements -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#64748b 1px, transparent 1px); background-size: 16px 16px;"></div>
<!-- Route SVG -->
<svg class="drop-shadow-sm" fill="none" height="80" viewbox="0 0 200 80" width="200" xmlns="http://www.w3.org/2000/svg">
<!-- Path -->
<path d="M40 40 C70 40, 70 70, 100 60 C130 50, 130 20, 160 30" stroke="#94a3b8" stroke-dasharray="6 4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
<!-- Stops -->
<circle cx="40" cy="40" fill="white" r="4" stroke="#94a3b8" stroke-width="2"></circle>
<circle cx="100" cy="60" fill="white" r="4" stroke="#94a3b8" stroke-width="2"></circle>
<circle cx="160" cy="30" fill="#94a3b8" r="4"></circle>
</svg>
</div>
</div>
</main>
<!-- Bottom Nav Bar (From Context) -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-surface-light dark:bg-surface-dark border-t border-slate-100 dark:border-slate-800 px-4 pb-6 pt-3 flex justify-around items-end z-20">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors group" href="#">
<div class="flex h-8 items-center justify-center transition-transform group-hover:-translate-y-1">
<span class="material-symbols-outlined">timeline</span>
</div>
<p class="text-xs font-medium">Timeline</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors group" href="#">
<div class="flex h-8 items-center justify-center transition-transform group-hover:-translate-y-1">
<span class="material-symbols-outlined">map</span>
</div>
<p class="text-xs font-medium">Map</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary dark:text-sky-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined icon-filled">business_center</span>
</div>
<p class="text-xs font-bold">Trips</p>
</a>
</nav>
</div>
</body></html>
